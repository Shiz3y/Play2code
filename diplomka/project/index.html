<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodeLearning - Изучай программирование через игру</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="main-menu" class="container">
        <header>
            <div class="logo">🎮 Code<span style="color: white">Learning</span></div>
            <div class="user-panel" id="user-panel">
                <span>Загрузка...</span>
            </div>
        </header>

        <div class="menu-header">
            <h1>ЗАЩИТИ СИСТЕМУ ОТ ВИРУСОВ</h1>
            <p>Вводи правильные ответы на вопросы программирования</p>
        </div>

        <div class="lang-tabs">
            <button class="lang-btn active" onclick="switchLang('python')">🐍 Python</button>
            <button class="lang-btn" onclick="switchLang('html')">🌐 HTML</button>
            <button class="lang-btn" onclick="switchLang('java')">☕ Java</button>
        </div>

        <div id="levels-map" class="levels-grid"></div>

        <div class="nav-links">
            <a href="library.html">📚 Библиотека знаний</a>
            <a href="profile.html">👤 Профиль</a>
            <a href="php/logout.php">🚪 Выход</a>
        </div>
    </div>

    <div id="game-stage">
        <button id="exit-game-btn" onclick="exitGame()">⏹ ВЫЙТИ (ESC)</button>
        
        <div class="game-hud">
            <div class="score-display">ОЧКИ: <span id="score-display">0</span></div>
            <div class="hp-container">
                <span>❤️</span>
                <div class="hp-bar">
                    <div id="hp-fill" class="hp-fill"></div>
                </div>
            </div>
            <div id="combo-display" style="color: #00f3ff; font-family: 'Orbitron'; display: none;">COMBO x1</div>
        </div>

        <div id="player-base">
            <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                <circle cx="50" cy="50" r="45" stroke="#00f3ff" stroke-width="3" fill="rgba(0, 243, 255, 0.1)"/>
                <circle cx="50" cy="50" r="25" fill="#00f3ff" opacity="0.5"/>
                <path d="M35 45 L45 50 L35 55 Z" fill="#fff"/>
                <path d="M65 45 L55 50 L65 55 Z" fill="#fff"/>
                <path d="M40 70 Q50 80 60 70" stroke="#00f3ff" stroke-width="3" fill="none"/>
            </svg>
        </div>

        <div id="input-zone">
            <input type="text" id="code-input" placeholder="ВВЕДИ ОТВЕТ И НАЖМИ ENTER..." autocomplete="off" spellcheck="false">
        </div>
    </div>

    <script src="js/game.js"></script>
    <script>
        fetch('php/check_session.php')
            .then(response => response.json())
            .then(data => {
                if (!data.logged_in) {
                    window.location.href = 'login.html';
                } else {
                    document.getElementById('user-panel').innerHTML = `
                        <span style="color: #00f3ff;">${data.username}</span>
                        <img src="assets/images/avatars/${data.avatar}" class="avatar-small" alt="Avatar">
                        <span style="color: #0aff0a;">${data.xp} XP</span>
                    `;
                    switchLang('python');
                }
            })
            .catch(err => {
                console.error('Auth error:', err);
                window.location.href = 'login.html';
            });

        let currentLang = 'python';
        function switchLang(lang) {
            currentLang = lang;
            
            document.querySelectorAll('.lang-btn').forEach(btn => {
                btn.classList.remove('active');
                if (btn.textContent.toLowerCase().includes(lang)) {
                    btn.classList.add('active');
                }
            });

            const map = document.getElementById('levels-map');
            map.innerHTML = '';
            
            const levels = levelsData[lang] || [];
            levels.forEach((level, idx) => {
                const card = document.createElement('div');
                card.className = 'level-card';
                card.innerHTML = `
                    <h3>${level.title}</h3>
                    <p>${level.description}</p>
                    <p style="color: #0aff0a; margin-bottom: 15px;">${level.qna.length} вопросов</p>
                    <button class="btn btn-primary" onclick="startGame('${lang}', ${idx})">🚀 НАЧАТЬ МИССИЮ</button>
                `;
                map.appendChild(card);
            });
        }

        document.addEventListener('DOMContentLoaded', () => {
            const input = document.getElementById('code-input');
            if (input) {
                input.addEventListener('keydown', (e) => {
                    if (e.key === 'Enter') {
                        e.preventDefault();
                        input.dispatchEvent(new Event('input'));
                    }
                });
            }
        });
    </script>
</body>
</html>
